<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <!-- Paper texture filter -->
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <clipPath id="roundRect">
      <rect width="192" height="192" rx="42" ry="42"/>
    </clipPath>
  </defs>

  <!-- Background: coral orange -->
  <rect width="192" height="192" rx="42" fill="#c96442"/>

  <!-- Subtle paper texture overlay -->
  <rect width="192" height="192" rx="42" fill="rgba(255,255,255,0.04)" filter="url(#paper)" clip-path="url(#roundRect)"/>

  <!-- S-curve: volatile left → settling → smooth right -->
  <path
    d="M 30,140
       C 45,140 48,80 65,105
       S 82,135 98,90
       S 115,55 130,80
       C 145,100 155,98 162,96"
    fill="none"
    stroke="white"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.92"
  />

  <!-- Dot at end of line -->
  <circle cx="162" cy="96" r="6" fill="white" opacity="0.92"/>
</svg>
